spring.application.name=barberpoint-bff
server.port=8080
server.servlet.context-path=/api

# Microservices URLs
ms.agendamentos.url=http://localhost:8081/api
ms.clientes-barbeiros.url=http://localhost:8082/api
azure.function.url=https://barberpoint-function.azurewebsites.net/api

# Logging
logging.level.root=INFO
logging.level.com.barberpoint=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always

# API Documentation
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# RestTemplate Timeout
spring.mvc.async.request-timeout=30000

# Resilience4j Circuit Breaker - Agendamentos
resilience4j.circuitbreaker.instances.agendamentosBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.agendamentosBreaker.slow-call-rate-threshold=50
resilience4j.circuitbreaker.instances.agendamentosBreaker.slow-call-duration-threshold=5s
resilience4j.circuitbreaker.instances.agendamentosBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.agendamentosBreaker.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.agendamentosBreaker.wait-duration-in-open-state=30s

# Resilience4j Circuit Breaker - Cliente
resilience4j.circuitbreaker.instances.clienteBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.clienteBreaker.sliding-window-size=10

# Resilience4j Circuit Breaker - Barbeiros
resilience4j.circuitbreaker.instances.barbeirosBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.barbeirosBreaker.sliding-window-size=10

# Resilience4j Circuit Breaker - Relatório
resilience4j.circuitbreaker.instances.relatorioBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.relatorioBreaker.sliding-window-size=10

# Resilience4j Retry
resilience4j.retry.instances.agendamentosRetry.max-attempts=3
resilience4j.retry.instances.agendamentosRetry.wait-duration=500ms
resilience4j.retry.instances.clienteRetry.max-attempts=3
resilience4j.retry.instances.clienteRetry.wait-duration=500ms
resilience4j.retry.instances.barbeirosRetry.max-attempts=2
resilience4j.retry.instances.relatorioRetry.max-attempts=2

# Resilience4j Time Limiter
resilience4j.timelimiter.instances.agendamentosLimiter.timeout-duration=10s
resilience4j.timelimiter.instances.clienteLimiter.timeout-duration=10s
resilience4j.timelimiter.instances.barbeirosLimiter.timeout-duration=10s
resilience4j.timelimiter.instances.relatorioLimiter.timeout-duration=15s
